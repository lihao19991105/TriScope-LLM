# Base detection configuration for TriScope-LLM bootstrap

default:
  query_budget: 32
  alpha: 0.5
  threshold:
    risk_score: 0.5
    alert_label: "suspicious"
  reasoning_template_name: "baseline_reasoning_v1"
  confidence_window_size: 5
  confidence_threshold: 0.85

reference:
  query_budget: 64
  alpha: 0.35
  threshold:
    risk_score: 0.65
    alert_label: "high_risk"
  reasoning_template_name: "counterfactual_reasoning_v1"
  confidence_window_size: 8
  confidence_threshold: 0.9
